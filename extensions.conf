; ===================================================================
;  extensions.conf - Dialplan de Asterisk para el AGI de taxis
; ===================================================================
;
; Cuando un usuario marca:
;   100  -> entra al servicio de taxis (invoca taxi_agi.py)
;   1001 -> llama al softphone interno 1001 (extension de prueba)
;   1002 -> llama al softphone interno 1002 (extension de prueba)
;
; Las llamadas internas entre 1001 y 1002 sirven para validar que
; Asterisk esta funcionando antes de probar el AGI.
;
; Ubicacion definitiva en la VM: /etc/asterisk/extensions.conf

[general]
static = yes
writeprotect = no
clearglobalvars = no

[globals]

; -------------------------------------------------------------------
;  Contexto principal: from-internal
;  Todo softphone configurado en pjsip.conf con context=from-internal
;  va a entrar aca cuando marque.
; -------------------------------------------------------------------
[from-internal]

; --- Servicio de taxis (la extension del AGI) ----------------------
exten => 100,1,NoOp(== Llamada al servicio de taxis ==)
 same => n,Answer()
 same => n,Wait(1)
 same => n,AGI(taxi_agi.py)
 same => n,Hangup()

; --- Llamadas entre softphones (1001 <-> 1002) ---------------------
exten => 1001,1,NoOp(Llamada al softphone 1001)
 same => n,Dial(PJSIP/1001,30)
 same => n,Hangup()

exten => 1002,1,NoOp(Llamada al softphone 1002)
 same => n,Dial(PJSIP/1002,30)
 same => n,Hangup()

; --- Echo test (util para probar audio) ----------------------------
exten => 600,1,NoOp(Echo test)
 same => n,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()
