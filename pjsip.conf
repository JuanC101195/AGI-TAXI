; ===================================================================
;  pjsip.conf - Usuarios SIP del Asterisk
; ===================================================================
;
; Define dos extensiones (1001 y 1002) que vamos a configurar en
; MicroSIP desde el host Windows para llamar al servicio.
;
; Ubicacion definitiva en la VM: /etc/asterisk/pjsip.conf
;
; Importante: si la red de la VM esta en NAT, MicroSIP probablemente
; no podra conectar. Configurar la VM con "Adaptador puente" en
; VirtualBox para que comparta red con el host.

; -------------------------------------------------------------------
;  Transporte UDP en el puerto SIP estandar (5060)
; -------------------------------------------------------------------
[transport-udp]
type            = transport
protocol        = udp
bind            = 0.0.0.0:5060

; -------------------------------------------------------------------
;  Plantilla comun para los endpoints (evita repetir codecs)
; -------------------------------------------------------------------
[endpoint-template](!)
type            = endpoint
context         = from-internal
disallow        = all
allow           = ulaw
allow           = alaw
direct_media    = no

[auth-template](!)
type            = auth
auth_type       = userpass

[aor-template](!)
type            = aor
max_contacts    = 1
remove_existing = yes

; -------------------------------------------------------------------
;  Extension 1001 (softphone principal)
; -------------------------------------------------------------------
[1001](endpoint-template)
auth            = 1001-auth
aors            = 1001
callerid        = "Softphone 1001" <1001>

[1001-auth](auth-template)
username        = 1001
password        = TaxiPass1001!

[1001](aor-template)

; -------------------------------------------------------------------
;  Extension 1002 (softphone secundario, para pruebas internas)
; -------------------------------------------------------------------
[1002](endpoint-template)
auth            = 1002-auth
aors            = 1002
callerid        = "Softphone 1002" <1002>

[1002-auth](auth-template)
username        = 1002
password        = TaxiPass1002!

[1002](aor-template)
